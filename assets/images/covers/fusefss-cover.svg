<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-label="FuseFSS paper cover"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef6ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient></defs><rect width="900" height="600" rx="32" fill="url(#g)"/><rect x="44" y="44" width="812" height="512" rx="24" fill="#fff" stroke="#b7d7f4" stroke-width="3"/><text x="90" y="130" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#0b3d66">FuseFSS</text><text x="90" y="185" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#2f4f66">Efficient Secure LLM Inference</text><text x="90" y="220" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#2f4f66">with Function Secret Sharing</text><g transform="translate(90 285)"><rect width="190" height="95" rx="18" fill="#eff8ff" stroke="#b7d7f4"/><text x="95" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0b63b6">1.24–1.50×</text><text x="95" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334">Speedup</text></g><g transform="translate(355 285)"><rect width="190" height="95" rx="18" fill="#f0fbf8" stroke="#bce3d8"/><text x="95" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#009688">9–16%</text><text x="95" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334">Less Communication</text></g><g transform="translate(620 285)"><rect width="190" height="95" rx="18" fill="#fff7ee" stroke="#ecd0aa"/><text x="95" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#a66300">20–24%</text><text x="95" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334">Smaller Keys</text></g><text x="90" y="465" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#334">ICML 2026 · Yuhan Ma, Yong Li, Stefan Schmid</text><text x="90" y="505" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#667">Compiler-style optimization for fixed-point nonlinearities and helper operations.</text></svg>
